services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-supfile_dev}
      POSTGRES_USER: ${DB_USER:-supfile}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-supfile} -d ${DB_NAME:-supfile_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5


  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Single source of truth for secrets (SMTP, JWT, OAuth, DB password).
    # Keep this file gitignored — it's loaded before the `environment:` block,
    # so the explicit overrides below still win for keys that need a docker-
    # specific value (DB_HOST=db, STORAGE_PATH=/app/storage, etc.).
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-supfile_dev}
      DB_USER: ${DB_USER:-supfile}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-}
      OAUTH_CALLBACK_URL: ${OAUTH_CALLBACK_URL:-http://localhost:3000/auth/oauth/google/callback}
      STORAGE_PATH: /app/storage
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:4000}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      RUN_MIGRATE_ON_START: ${RUN_MIGRATE_ON_START:-false}
    volumes:
      - file_storage:/app/storage
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ./client-web
      dockerfile: Dockerfile
      args:
        INTERNAL_API_URL: http://server:3000
        NEXT_PUBLIC_API_URL: http://server:3000
    restart: unless-stopped
    depends_on:
      - server
    environment:
      INTERNAL_API_URL: http://server:3000
      NEXT_PUBLIC_API_URL: http://server:3000
    ports:
      - "4000:4000"

volumes:
  pg_data:
  file_storage: