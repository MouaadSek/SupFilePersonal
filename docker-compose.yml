services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-supfile_dev}
      POSTGRES_USER: ${DB_USER:-supfile}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-supfile} -d ${DB_NAME:-supfile_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5


  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-supfile_dev}
      DB_USER: ${DB_USER:-supfile}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-}
      OAUTH_CALLBACK_URL: ${OAUTH_CALLBACK_URL:-http://localhost:3000/auth/oauth/callback}
      STORAGE_PATH: /app/storage
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:4000}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    volumes:
      - file_storage:/app/storage
    ports:
      - "3000:3000"

  web:
    build:
      context: ./client-web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "4000:4000"

volumes:
  pg_data:
  file_storage: